name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        run: |
          npm install
          npm install -g eas-cli

      - name: Build with EAS
        run: eas build --platform android --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: android-apk
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30

      - name: Create Release Notes
        if: success()
        run: |
          echo "✅ APK Build Success" > RELEASE_NOTES.md
          echo "📱 Download the APK from artifacts" >> RELEASE_NOTES.md
          echo "📅 Build Date: $(date)" >> RELEASE_NOTES.md

      - name: Upload Release Notes
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: release-notes
          path: RELEASE_NOTES.md
